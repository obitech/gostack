name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # Library packages (root module)
  # ──────────────────────────────────────────────────────────────
  library:
    name: Library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4

  # ──────────────────────────────────────────────────────────────
  # Full-stack template (templates/full module)
  # ──────────────────────────────────────────────────────────────
  template-go:
    name: Template / Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/full
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true
          cache-dependency-path: templates/full/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
          working-directory: templates/full

  template-frontend:
    name: Template / Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/full/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: templates/full/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test --if-present

  template-docker:
    name: Template / Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gostack-template:ci templates/full
